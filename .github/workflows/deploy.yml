name: Deploy Production

# TODO: Configure Cloudflare Pages with @astrojs/cloudflare adapter, or Docker deploy
# Currently @astrojs/node (standalone SSR) is incompatible with Cloudflare Pages.
# Options:
#   1. Switch to @astrojs/cloudflare adapter for Cloudflare Pages deployment
#   2. Deploy via Docker to VPS (same pattern as staging, different compose file)

on:
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  build:
    name: Validate Production Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_BACKEND_URL: https://main-api.contactoinmobiliarioibague.com

      - name: Build succeeded
        run: echo "Production build validated successfully. Deployment strategy TBD."
